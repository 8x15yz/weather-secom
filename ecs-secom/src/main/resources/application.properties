## ====================================================
## optimal-ecs-secom 설정
## SECOM Consumer Terminal for Web-ECDIS
## ====================================================

spring.application.name=optimal-ecs-secom

## weather-secom과 포트 충돌 방지 (weather-secom: 8766)
server.port=8767

## SECOM 컨텍스트 경로 (weather-secom과 동일)
spring.jersey.application-path=/api/secom

## ====================================================
## weather-secom 연결 설정
## ====================================================
## 로컬 테스트: http://localhost:8766
## AWS 배포 후: http://52.78.244.211:8766
weather.secom.url=http://weather-secom:8766

## ====================================================
## SECOM SSL/인증서 설정 (weather-secom과 동일)
## ====================================================

secom.security.ssl.insecureSslPolicy=true
secom.security.ssl.keystore=classpath:keystore.p12
secom.security.ssl.keystore-type=PKCS12
secom.security.ssl.keystore-password=UIG47L6J3CHI7ULQ7XFB2EYDIA

## 실제 인증서 준비되면 아래 주석 해제 후 사용
# secom.security.ssl.keystore=keystore.p12
# secom.security.ssl.keystore-type=pkcs12
# secom.security.ssl.keystore-password=changeit
# secom.security.ssl.truststore=truststore.jks
# secom.security.ssl.truststore-type=jks
# secom.security.ssl.truststore-password=changeit

## ====================================================
## 서비스 메타데이터
## ====================================================
secom.service.version=0.0.1
secom.service.name=BlueMap Web-ECDIS SECOM Consumer
secom.service.description=Web-ECDIS용 SECOM 소비자 터미널 (Optimal-LOADS 프로젝트)
## MRN은 추후 KRISO MCP에서 발급
secom.service.mrn=urn:mrn:mcp:entity:mcc:kriso:

## ====================================================
## 로깅
## ====================================================
logging.level.dev.bluemap=DEBUG
logging.level.org.grad.secom=INFO
