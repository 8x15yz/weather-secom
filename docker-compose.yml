services:

  weather-secom:
    build:
      context: ./weather-secom
      dockerfile: Dockerfile
    image: bluemap/weather-secom:latest
    container_name: weather-secom
    restart: unless-stopped
    ports:
      - "8766:8766"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8766/api/secom/v1/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  ecs-secom:
    build:
      context: ./ecs-secom
      dockerfile: Dockerfile
    image: bluemap/ecs-secom:latest
    container_name: ecs-secom
    restart: unless-stopped
    ports:
      - "8767:8767"
    depends_on:
      weather-secom:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8767/api/secom/v1/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"