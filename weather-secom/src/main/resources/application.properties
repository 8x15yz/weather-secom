## ====================================================
## BlueMap SECOM Wrapper - 설정 파일
## ====================================================

server.port=8766

## SECOM 기본 경로 (JAX-RS 애플리케이션 경로)
## 최종 엔드포인트 예: http://localhost:8766/api/secom/v1/ping
spring.jersey.application-path=/api/secom

## ====================================================
## 기상 API 설정 (optimal-loads 백엔드)
## ====================================================
weather.api.base-url=http://weather-api.bmap.kr
weather.api.path=/api/griddata
weather.api.default-source=noaa
weather.api.default-dataset=original
weather.api.default-model=gfs
weather.api.default-variable=DIRPW
weather.api.default-buffer-km=50.0
weather.api.default-step-hours=0
weather.api.default-run-time=2025-07-01T00:00:00Z

## ====================================================
## SECOM SSL/인증서 설정
## - 로컬 개발 중에는 insecure 정책 사용 (인증서 검증 스킵)
## - 실제 배포 시: keystore/truststore 경로로 교체 필요
## ====================================================
# secom.security.ssl.insecureSslPolicy=true

# 인증서 설정 추가
secom.security.ssl.keystore=classpath:keystore.p12
secom.security.ssl.keystore-type=PKCS12
secom.security.ssl.keystore-password=RKFQD6XDML46E34S7XGN4CRBG2

## 실제 인증서 준비되면 아래 주석 해제 후 사용
# secom.security.ssl.keystore=keystore.jks
# secom.security.ssl.keystore-type=jks
# secom.security.ssl.keystore-password=changeit
# secom.security.ssl.truststore=truststore.jks
# secom.security.ssl.truststore-type=jks
# secom.security.ssl.truststore-password=changeit

## ====================================================
## 서비스 메타데이터 (MSR 등록 시 사용)
## ====================================================
secom.service.name=BlueMap Marine Weather Service
secom.service.version=0.0.1
secom.service.description=NOAA GFS 기반 해양 기상 예측 데이터 서비스 (Optimal-LOADS 프로젝트)
## MRN은 KRISO MCP에서 발급받은 후 여기에 입력
secom.service.mrn=urn:mrn:mcp:entity:mcc:kriso:

## ====================================================
## 로깅
## ====================================================
logging.level.dev.bluemap=DEBUG
logging.level.org.grad.secom=INFO
